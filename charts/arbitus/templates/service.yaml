apiVersion: v1
kind: Service
metadata:
  name: {{ include "arbitus.fullname" . }}
  labels:
    {{- include "arbitus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
      {{- include "arbitus.selectorLabels" . | nindent 4 }}
