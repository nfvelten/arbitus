{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "arbitus.fullname" . }}
  labels:
    {{- include "arbitus.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "arbitus.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from pods labelled arbitus-client: "true" (AI agents)
    - from:
        - podSelector:
            matchLabels:
              arbitus-client: "true"
      ports:
        - protocol: TCP
          port: 4000
    # Allow Kubernetes liveness/readiness probes from the kubelet
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 4000
    {{- with .Values.networkPolicy.additionalIngressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
